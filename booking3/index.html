<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css?family=Geologica&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link href="../shared/styles.css" rel="stylesheet" />
  <link href="../shared/booking.css" rel="stylesheet" />
  <link href="./css/main.css" rel="stylesheet" />
  <title>Booking Confirmation - Horizon Studio</title>
</head>
<body>
  <header class="header">
    <a href="/home/" class="header-brand" aria-label="Horizon Studio Home">
      <img src="../header/images/logo.jpg" alt="Horizon Studio" class="header-logo" />
    </a>
    <nav class="header-nav">
      <ul class="header-menu">
        <li><a href="/home/" class="header-link">Home</a></li>
        <li><a href="/services/" class="header-link">Services</a></li>
        <li><a href="/photographers/" class="header-link">Photographers</a></li>
        <li><a href="/location/" class="header-link">Location</a></li>
        <li><a href="/contact/" class="header-link">Contact</a></li>
        <li><a href="/booking1/" class="header-link header-link--primary header-link--active">Book Now</a></li>
      </ul>
    </nav>
  </header>

  <main class="page">
    <section class="page-content booking-content container-xl">
      <h1 class="page-title">Session Booked!</h1>

      <div class="confirmation-card mx-auto" style="max-width: 1000px; width: 100%;">
        <p class="confirmation-text"><strong>Date and Time:</strong> Mon 5th June at 4:30pm</p>
        <p class="confirmation-text"><strong>Service:</strong> Landscape Photo Session</p>
        <p class="confirmation-text"><strong>Photographer:</strong> Alex Morgan</p>
        <p class="confirmation-text"><strong>Booking ID:</strong> #12345</p>
        <p class="confirmation-text">You will receive a confirmation email shortly!</p>
      </div>

      <div class="form-navigation mx-auto" style="max-width: 1000px; width: 100%;">
        <a href="/booking1/" class="form-link">← New Booking</a>
        <a href="/home/" class="form-link form-link--primary">Go Home →</a>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link href="https://fonts.googleapis.com/css?family=Geologica&display=swap" rel="stylesheet" />
	<link href="../shared/styles.css" rel="stylesheet" />
	<link href="./css/main.css" rel="stylesheet" />
	<title>Contact - Horizon Studio</title>
</head>
<body>
	<header class="header">
		<a href="/" class="header__brand" aria-label="Horizon Studio Home">
			<img src="../header/images/logo.png" alt="Horizon Studio" class="header__logo" />
		</a>
		<nav class="header__nav">
			<ul class="header__menu">
				<li><a href="/" class="header__link">Home</a></li>
				<li><a href="/services/" class="header__link">Services</a></li>
				<li><a href="/photographers/" class="header__link">Photographers</a></li>
				<li><a href="/location/" class="header__link">Location</a></li>
				<li><a href="/contact/" class="header__link header__link--cta header__link--active">Contact</a></li>
				<li><a href="/booking1/" class="header__link header__link--primary">Book Now</a></li>
			</ul>
		</nav>
	</header>

	<main class="page">
		<section class="page__content">
			<h1 class="page__title">Contact</h1>

			<div class="contact-content">
				<div class="contact-items">
					<article class="contact-item">
						<div class="contact-item__icon">✉️</div>
						<h2 class="contact-item__label">Email</h2>
						<a class="contact-item__link" href="mailto:contact@horizonstudios.com">contact@horizonstudios.com</a>
					</article>

					<article class="contact-item">
						<div class="contact-item__icon">📞</div>
						<h2 class="contact-item__label">Phone</h2>
						<a class="contact-item__link" href="tel:+13435550198">(343) 555-0198</a>
					</article>
				</div>
			</div>
		</section>
	</main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css?family=Geologica&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link href="../shared/styles.css" rel="stylesheet" />
  <link href="./css/main.css" rel="stylesheet" />
  <title>Contact - Horizon Studio</title>
</head>
<body>
  <header class="header">
    <a href="/home/" class="header-brand" aria-label="Horizon Studio Home">
      <img src="../header/images/logo.jpg" alt="Horizon Studio" class="header-logo" />
    </a>
    <nav class="header-nav">
      <ul class="header-menu">
        <li><a href="/home/" class="header-link">Home</a></li>
        <li><a href="/services/" class="header-link">Services</a></li>
        <li><a href="/photographers/" class="header-link">Photographers</a></li>
        <li><a href="/location/" class="header-link">Location</a></li>
        <li><a href="/contact/" class="header-link header-link--active">Contact</a></li>
        <li><a href="/booking1/" class="header-link header-link--primary">Book Now</a></li>
      </ul>
    </nav>
  </header>

  <main class="page">
    <section class="page-content container-xl">
      <h1 class="page-title">Contact</h1>

      <div class="contact-content">
        <div class="info-section contact-card w-100">
          <div class="row g-4 justify-content-center contact-items">
            <article class="col-12 col-md-6 contact-item">
              <div class="contact-item-icon" aria-hidden="true"><i class="bi bi-envelope-fill"></i></div>
              <h2 class="contact-item-label">Email</h2>
              <a class="contact-item-link" href="mailto:contact@horizonstudios.com">contact@horizonstudios.com</a>
            </article>

            <article class="col-12 col-md-6 contact-item">
              <div class="contact-item-icon" aria-hidden="true"><i class="bi bi-telephone-fill"></i></div>
              <h2 class="contact-item-label">Phone</h2>
              <a class="contact-item-link" href="tel:+13435550198">(343) 555-0198</a>
            </article>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>

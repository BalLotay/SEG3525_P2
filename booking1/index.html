<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css?family=Geologica&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link href="../shared/styles.css" rel="stylesheet" />
  <link href="../shared/booking.css" rel="stylesheet" />
  <link href="./css/main.css" rel="stylesheet" />
  <title>Book a Session - Horizon Studio</title>
</head>
<body>
  <header class="header">
    <a href="/home/" class="header-brand" aria-label="Horizon Studio Home">
      <img src="../header/images/logo.jpg" alt="Horizon Studio" class="header-logo" />
    </a>
    <nav class="header-nav">
      <ul class="header-menu">
        <li><a href="/home/" class="header-link">Home</a></li>
        <li><a href="/services/" class="header-link">Services</a></li>
        <li><a href="/photographers/" class="header-link">Photographers</a></li>
        <li><a href="/location/" class="header-link">Location</a></li>
        <li><a href="/contact/" class="header-link">Contact</a></li>
        <li><a href="/booking1/" class="header-link header-link--primary header-link--active">Book Now</a></li>
      </ul>
    </nav>
  </header>

  <main class="page">
    <section class="page-content booking-content container-xl">
      <h1 class="page-title">Book a Session</h1>

      <form class="booking-form mx-auto" style="max-width: 1000px; width: 100%;" action="/booking2/" method="get">
        <fieldset class="form-group">
          <legend class="form-group-title">Service</legend>
          <div class="form-group-options">
            <label class="form-option">
              <input type="radio" name="service" value="landscape" />
              <span>Landscape Photo Session</span>
            </label>
            <label class="form-option">
              <input type="radio" name="service" value="drone" />
              <span>Drone Landscape Photography</span>
            </label>
          </div>
        </fieldset>

        <fieldset class="form-group">
          <legend class="form-group-title">Date and Time</legend>
          <input type="datetime-local" name="datetime" class="form-input" required />
        </fieldset>

        <fieldset class="form-group">
          <legend class="form-group-title">Photographer</legend>
          <div class="form-group-options">
            <label class="form-option">
              <input type="radio" name="photographer" value="alex" />
              <span>Alex Morgan - Lead Landscape Photographer</span>
            </label>
            <label class="form-option">
              <input type="radio" name="photographer" value="jamie" />
              <span>Jamie Chen - Drone Photography Specialist</span>
            </label>
          </div>
        </fieldset>

        <button type="submit" class="form-submit">Submit Booking</button>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>

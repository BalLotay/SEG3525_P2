<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css?family=Geologica&display=swap" rel="stylesheet" />
  <link href="../shared/styles.css" rel="stylesheet" />
  <link href="./css/main.css" rel="stylesheet" />
  <title>Location - Horizon Studio</title>
</head>
<body>
  <header class="header">
    <a href="/" class="header__brand" aria-label="Horizon Studio Home">
      <img src="../header/images/logo.png" alt="Horizon Studio" class="header__logo" />
    </a>
    <nav class="header__nav">
      <ul class="header__menu">
        <li><a href="/" class="header__link">Home</a></li>
        <li><a href="/services/" class="header__link">Services</a></li>
        <li><a href="/photographers/" class="header__link">Photographers</a></li>
        <li><a href="/location/" class="header__link header__link--active">Location</a></li>
        <li><a href="/contact/" class="header__link header__link--cta">Contact</a></li>
        <li><a href="/booking1/" class="header__link header__link--primary">Book Now</a></li>
      </ul>
    </nav>
  </header>

  <main class="page">
    <section class="page__content">
      <h1 class="page__title">Visit Us</h1>

      <div class="location-content">
        <div class="info-section">
          <div class="location-item">
            <h3 class="location-item__label">📍 Address</h3>
            <p class="location-item__content">145 Beausoleil Dr, Ottawa, ON</p>
          </div>

          <div class="location-item">
            <h3 class="location-item__label">🕐 Hours</h3>
            <p class="location-item__content">
              Mon–Fri: 9am–6pm<br>
              Sat: 10am–4pm
            </p>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>

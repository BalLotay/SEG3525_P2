<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css?family=Geologica&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link href="../shared/styles.css" rel="stylesheet" />
  <link href="./css/main.css" rel="stylesheet" />
  <title>Location - Horizon Studio</title>
</head>
<body>
  <header class="header">
    <a href="/home/" class="header-brand" aria-label="Horizon Studio Home">
      <img src="../header/images/logo.jpg" alt="Horizon Studio" class="header-logo" />
    </a>
    <nav class="header-nav">
      <ul class="header-menu">
        <li><a href="/home/" class="header-link">Home</a></li>
        <li><a href="/services/" class="header-link">Services</a></li>
        <li><a href="/photographers/" class="header-link">Photographers</a></li>
        <li><a href="/location/" class="header-link header-link--active">Location</a></li>
        <li><a href="/contact/" class="header-link">Contact</a></li>
        <li><a href="/booking1/" class="header-link header-link--primary">Book Now</a></li>
      </ul>
    </nav>
  </header>

  <main class="page">
    <section class="page-content container-xl">
      <h1 class="page-title">Visit Us</h1>

      <div class="location-content">
        <div class="row g-4 w-100 align-items-stretch">
          <div class="col-12 col-lg-6">
            <div class="studio-card location-image-card h-100">
              <img src="./images/location.jpg" alt="Horizon Studio location exterior" class="location-image-card-image" />
            </div>
          </div>

          <div class="col-12 col-lg-6">
            <div class="info-section w-100 h-100">
              <div class="location-item">
                <h2 class="location-item-label">📍 Address</h2>
                <p class="location-item-content">145 Beausoleil Dr, Ottawa, ON</p>
              </div>

              <div class="location-item">
                <h2 class="location-item-label">🕐 Hours</h2>
                <p class="location-item-content">
                  Mon-Fri: 9am-6pm<br>
                  Sat: 10am-4pm
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>

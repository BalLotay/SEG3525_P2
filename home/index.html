<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css?family=Geologica&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link href="../shared/styles.css" rel="stylesheet" />
  <link href="./css/main.css" rel="stylesheet" />
  <title>Horizon Studio - Home</title>
</head>
<body style="--page-background: url('./images/bg.jpg');">
  <header class="header">
    <a href="/home/" class="header-brand" aria-label="Horizon Studio Home">
      <img src="../header/images/logo.jpg" alt="Horizon Studio" class="header-logo" />
    </a>
    <nav class="header-nav">
      <ul class="header-menu">
        <li><a href="/home/" class="header-link header-link--active">Home</a></li>
        <li><a href="/services/" class="header-link">Services</a></li>
        <li><a href="/photographers/" class="header-link">Photographers</a></li>
        <li><a href="/location/" class="header-link">Location</a></li>
        <li><a href="/contact/" class="header-link">Contact</a></li>
        <li><a href="/booking1/" class="header-link header-link--primary">Book Now</a></li>
      </ul>
    </nav>
  </header>

  <main class="page">
    <section class="hero">
      <div class="hero-content">
        <h1 class="hero-title">Horizon Studio</h1>
        <p class="hero-subtitle">Your Story, Beautifully Told</p>
      </div>
    </section>

    <section class="page-content container-xl">
      <div class="info-section">
        <h2 class="info-section-title">Get in Touch</h2>
        <p class="info-section-content">
          📍 145 Beausoleil Dr, Ottawa, ON<br />
          📞 (343) 555-0198<br />
          <br />
          🕐 Mon-Fri: 9am-6pm<br />
          🕐 Sat: 10am-4pm
        </p>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
